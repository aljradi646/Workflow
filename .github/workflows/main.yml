name: Import Project

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install --quiet gdown
          sudo apt-get update
          sudo apt-get install -y unzip rsync

      - name: Download archive from Google Drive
        run: |
          rm -f project.zip
          gdown 1csNSMjgN3K9AaZ9_MY0uRkroFsIwitfZ -O project.zip

      - name: Verify archive
        run: |
          file project.zip
          test -s project.zip

      - name: Extract archive to temp folder
        run: |
          rm -rf /tmp/import-project
          mkdir -p /tmp/import-project
          unzip -q project.zip -d /tmp/import-project

      - name: Sync extracted files into repository
        run: |
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/workflows/' \
            /tmp/import-project/ ./

      - name: Remove archive
        run: rm -f project.zip

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Import project" || exit 0

      - name: Push changes
        run: |
          git push https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
